<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>삼보 Irene T Class 성적표</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f0f2f5;color:#1a1a2e;line-height:1.6;padding:16px;max-width:800px;margin:0 auto}
.header{background:linear-gradient(135deg,#1a237e 0%,#3949ab 100%);color:white;border-radius:16px;padding:24px;margin-bottom:16px}
.header h1{font-size:22px;margin-bottom:4px}
.header .sub{font-size:13px;opacity:0.8;margin-bottom:12px}
.stats{display:flex;flex-wrap:wrap;gap:8px}
.stat{background:rgba(255,255,255,0.15);border-radius:8px;padding:6px 12px;font-size:13px;font-weight:600}
.section{background:white;border-radius:12px;padding:20px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,0.08)}
.charts-grid{display:grid;grid-template-columns:1fr;gap:12px;margin-bottom:16px}
@media(min-width:600px){.charts-grid{grid-template-columns:1fr 1fr}}
.chart-card{background:white;border-radius:12px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,0.08)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#f5f5f5;padding:8px 6px;text-align:center;font-weight:600;border-bottom:2px solid #e0e0e0;font-size:12px}
td{padding:8px 6px;text-align:center;border-bottom:1px solid #f0f0f0}
tr:hover{background:#fafafa}
.footer{text-align:center;color:#9e9e9e;font-size:12px;padding:16px 0}
.error-page{text-align:center;padding:60px 20px}
.error-page h2{color:#e53935;margin-bottom:12px}
.pass{color:#2e7d32;font-weight:700}.fail{color:#c62828}.retest{color:#e65100;font-weight:700}.absent{color:#9e9e9e}
.avg-cell{color:#78909c;font-size:12px}
.attend-o{color:#43a047;font-weight:700}.attend-x{color:#e53935;font-weight:700}
.cal-section{background:white;border-radius:12px;padding:20px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,0.08)}
.cal-months{display:flex;flex-wrap:wrap;gap:20px}
.cal-month{flex:1;min-width:260px}
.cal-month-title{font-size:15px;font-weight:700;color:#1a237e;margin-bottom:8px;text-align:center}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-hdr{text-align:center;font-size:11px;font-weight:600;color:#78909c;padding:4px 0}
.cal-hdr.sun{color:#e53935}.cal-hdr.sat{color:#1565c0}
.cal-cell{text-align:center;padding:6px 2px;border-radius:8px;font-size:13px;min-height:40px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px}
.cal-cell .cd{font-weight:600;font-size:13px}.cal-cell .cm{font-size:10px;font-weight:700}
.cal-cell.empty{}.cal-cell.no-class{color:#bdbdbd}
.cal-cell.holiday{background:#fff3e0;color:#e65100}.cal-cell.holiday .cm{font-size:9px;color:#bf360c}
.cal-cell.cls-p{background:#e8f5e9;border:2px solid #43a047}.cal-cell.cls-p .cd{color:#2e7d32}.cal-cell.cls-p .cm{color:#2e7d32}
.cal-cell.cls-l{background:#fff3e0;border:2px solid #f57c00}.cal-cell.cls-l .cd{color:#e65100}.cal-cell.cls-l .cm{color:#e65100}
.cal-cell.cls-a{background:#ffebee;border:2px solid #e53935}.cal-cell.cls-a .cd{color:#c62828}.cal-cell.cls-a .cm{color:#c62828}
.cal-cell.cls-nd{background:#e3f2fd;border:2px dashed #90caf9;color:#64b5f6}
.cal-cell.brk{background:#f3e5f5;color:#7b1fa2}.cal-cell.brk .cm{font-size:9px;color:#7b1fa2}
.cal-cell.sun-d .cd{color:#e53935}.cal-cell.sat-d .cd{color:#1565c0}
.cal-cell.cli-p{background:#e0f2f1;border:2px solid #00897b}.cal-cell.cli-p .cd{color:#00695c}.cal-cell.cli-p .cm{color:#00695c}
.cal-cell.cli-a{background:#fbe9e7;border:2px solid #ff8a65}.cal-cell.cli-a .cd{color:#bf360c}.cal-cell.cli-a .cm{color:#bf360c}
.cal-legend{display:flex;gap:14px;margin-top:12px;flex-wrap:wrap;justify-content:center}
.cal-legend-item{display:flex;align-items:center;gap:5px;font-size:12px;color:#555}
.cal-legend-dot{width:14px;height:14px;border-radius:4px}
.rt-box{background:#fff3e0;border-left:4px solid #ff9800;border-radius:0 12px 12px 0;padding:16px 20px;margin-bottom:16px}
.rt-box h3{color:#e65100;font-size:15px;margin:0 0 10px;display:flex;align-items:center;gap:6px}
.rt-box .rt-badge{background:#ff9800;color:white;font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px}
.rt-list{display:flex;flex-wrap:wrap;gap:6px}
.rt-chip{background:white;border:1.5px solid #ffb74d;border-radius:8px;padding:6px 12px;font-size:12px;font-weight:600;color:#e65100;display:flex;flex-direction:column;gap:2px}
.rt-chip .rt-date{font-size:10px;color:#bf360c;font-weight:400}
.rt-none{color:#4caf50;font-size:14px;font-weight:600;padding:16px 0;text-align:center}
.hw-box{background:#fce4ec;border-left:4px solid #e91e63;border-radius:0 12px 12px 0;padding:16px 20px;margin-bottom:16px}
.hw-box h3{color:#c62828;font-size:15px;margin:0 0 10px;display:flex;align-items:center;gap:6px}
.hw-box .hw-badge{background:#e91e63;color:white;font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px}
.hw-list{display:flex;flex-wrap:wrap;gap:6px}
.hw-chip{background:white;border:1.5px solid #f48fb1;border-radius:8px;padding:6px 12px;font-size:12px;font-weight:600;color:#c62828;display:flex;flex-direction:column;gap:2px}
.hw-chip .hw-date{font-size:10px;color:#ad1457;font-weight:400}
.hw-none{color:#4caf50;font-size:14px;font-weight:600;padding:16px 0;text-align:center}
</style>
</head>

  h+=buildCal(name,records);
  h+='<div class="footer">삼보어학원 Irene T Class 성적표</div>';
  app.innerHTML=h;

  var gD=presentRecords.map(function(r){return r.grammar});
  var rD=presentRecords.map(function(r){return r.reading});
  var vD=presentRecords.map(function(r){return r.vocab});
  var gRk=presentRecords.map(function(r){return cr[r.date]?cr[r.date].grammar:null});
  var rRk=presentRecords.map(function(r){return cr[r.date]?cr[r.date].reading:null});
  var vRk=presentRecords.map(function(r){return cr[r.date]?cr[r.date].vocab:null});
  mkChart(document.getElementById("gChart"),labels,gD,defMax.grammar,8,7,gRk);
  if(hasR)mkChart(document.getElementById("rChart"),labels,rD,defMax.reading,4,undefined,rRk);
  mkChart(document.getElementById("vChart"),labels,vD,defMax.vocab,40,undefined,vRk);
}

function isBreak(y,mo,dy){for(var i=0;i<BREAKS.length;i++){var b=BREAKS[i];var s=new Date(y,b[0]-1,b[1]);var e=new Date(y,b[2]-1,b[3]);var c=new Date(y,mo-1,dy);if(c>=s&&c<=e)return b[4]}return null}
function buildCal(nm,recs){
  var mm={};for(var i=0;i<recs.length;i++){var r=recs[i];var mt=r.date.match(/(\d+)월\s*(\d+)일/);if(!mt)continue;var mo=parseInt(mt[1]);if(!mm[mo])mm[mo]={};mm[mo][parseInt(mt[2])]=r.present}
  var mons=Object.keys(mm).map(Number).sort(function(a,b){return a-b});if(!mons.length)return "";
  var y=2026;var dn=["일","월","화","수","목","금","토"];var dc=["sun","","","","","","sat"];
  var h='<div class="cal-section"><h3 style="margin:0 0 12px;font-size:16px;color:#1a237e">📅 출석 현황 캘린더</h3><div class="cal-months">';
  for(var mi=0;mi<mons.length;mi++){var mon=mons[mi];var ad=mm[mon];
    h+='<div class="cal-month"><div class="cal-month-title">'+y+"년 "+mon+"월</div>";
    h+='<div class="cal-grid">';
    for(var di=0;di<7;di++)h+='<div class="cal-hdr '+dc[di]+'">'+dn[di]+"</div>";
    var fd=new Date(y,mon-1,1).getDay();var dim=new Date(y,mon,0).getDate();
    for(var e=0;e<fd;e++)h+='<div class="cal-cell empty"></div>';
    for(var d=1;d<=dim;d++){var dow=new Date(y,mon-1,d).getDay();var isCd=CLASS_DAYS.indexOf(dow)!==-1;var isW=dow===3;
      var hk=mon+"-"+d;var hol=HOLIDAYS[hk]||null;var brk=isBreak(y,mon,d);
      var ck=y+"-"+String(mon).padStart(2,"0")+"-"+String(d).padStart(2,"0");var cliSt=null;
      if(isW&&!hol&&!brk&&CLINIC[ck])cliSt=CLINIC[ck].indexOf(nm)!==-1;
      var cc="cal-cell",mk="";
      var cliAfter10=new Date()>=new Date(y,mon-1,d,22,0,0);
      if(hol){cc+=" holiday";mk=hol}else if(brk){cc+=" brk";mk="휴강"}else if(isCd&&ad[d]!==undefined){if(ad[d]==="late"){cc+=" cls-l";mk="⏰ 지각"}else if(ad[d]){cc+=" cls-p";mk="O 출석"}else{cc+=" cls-a";mk="X 결석"}}else if(isCd){cc+=" cls-nd";mk="수업일"}else if(cliSt===true){cc+=" cli-p";mk="클리닉O"}else if(cliSt===false){if(cliAfter10){cc+=" cli-a";mk="클리닉X"}else{cc+=" no-class"}}else if(isW&&CLINIC[ck]){if(cliAfter10){cc+=" cli-a";mk="클리닉X"}else{cc+=" no-class"}}else{cc+=" no-class";if(dow===0)cc+=" sun-d";if(dow===6)cc+=" sat-d"}
      h+='<div class="'+cc+'"><span class="cd">'+d+"</span>";if(mk)h+='<span class="cm">'+mk+"</span>";h+="</div>"}
    h+="</div></div>"}
  h+="</div>";
  h+='<div class="cal-legend">';
  h+='<div class="cal-legend-item"><div class="cal-legend-dot" style="background:#e8f5e9;border:2px solid #43a047"></div> 출석</div>';
  h+='<div class="cal-legend-item"><div class="cal-legend-dot" style="background:#fff3e0;border:2px solid #f57c00"></div> 지각</div>';
  h+='<div class="cal-legend-item"><div class="cal-legend-dot" style="background:#ffebee;border:2px solid #e53935"></div> 결석</div>';
  h+='<div class="cal-legend-item"><div class="cal-legend-dot" style="background:#e3f2fd;border:2px dashed #90caf9"></div> 수업일</div>';
  h+='<div class="cal-legend-item"><div class="cal-legend-dot" style="background:#fff3e0"></div> 공휴일</div>';
  h+='<div class="cal-legend-item"><div class="cal-legend-dot" style="background:#f3e5f5"></div> 휴강</div>';
  h+='<div class="cal-legend-item"><div class="cal-legend-dot" style="background:#e0f2f1;border:2px solid #00897b"></div> 수요클리닉</div>';
  h+="</div></div>";return h}

function mkChart(ctx,labels,scores,maxVal,passLine,retestLine,ranks){
  var data=scores.map(function(s){return(s===null||isNaN(s))?null:s});
  new Chart(ctx,{type:"line",data:{labels:labels,datasets:[{data:data,borderColor:"#3949ab",backgroundColor:"rgba(57,73,171,0.1)",borderWidth:2.5,pointRadius:5,
    pointBackgroundColor:data.map(function(s){if(s===null)return"#9e9e9e";if(retestLine!==undefined&&s<=retestLine)return"#ff9800";if(s>=passLine)return"#43a047";return"#e53935"}),
    pointBorderColor:"#fff",pointBorderWidth:2,fill:true,tension:0.3,spanGaps:false}]},
  options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:function(c){var v=c.raw;if(v===null)return"결석";var st=v>=passLine?"✅ 통과":"❌ 미통과";if(retestLine!==undefined&&v<=retestLine)st="⚠️ 재시";var tx=v+"점 "+st;if(ranks&&ranks[c.dataIndex]){var rk=ranks[c.dataIndex];tx+=" ("+rk.rank+"/"+rk.total+"등)"}return tx}}}},
    scales:{y:{min:0,max:maxVal,grid:{color:"#f0f0f0"}},x:{ticks:{font:{size:10},maxRotation:45},grid:{display:false}}}},
  plugins:[{id:"pl",beforeDraw:function(ch){var c=ch.ctx,yA=ch.scales.y,xA=ch.scales.x;c.save();
    var pY=yA.getPixelForValue(passLine);c.strokeStyle="#43a047";c.lineWidth=1.5;c.setLineDash([6,4]);c.beginPath();c.moveTo(xA.left,pY);c.lineTo(xA.right,pY);c.stroke();
    c.fillStyle="#43a047";c.font="10px sans-serif";c.textAlign="left";c.fillText("통과 "+passLine,xA.left+4,pY-4);
    if(retestLine!==undefined){var rY=yA.getPixelForValue(retestLine);c.strokeStyle="#ff9800";c.lineWidth=1.5;c.setLineDash([4,4]);c.beginPath();c.moveTo(xA.left,rY);c.lineTo(xA.right,rY);c.stroke();
      c.fillStyle="#ff9800";c.font="10px sans-serif";c.textAlign="right";c.fillText("재시 "+retestLine,xA.right-4,rY-4)}
    c.restore()}},
  {id:"sl",afterDatasetsDraw:function(ch){var c=ch.ctx;c.save();
    ch.getDatasetMeta(0).data.forEach(function(pt,i){var val=data[i];if(val===null)return;c.textAlign="center";c.textBaseline="bottom";
      var col=val>=passLine?"#2e7d32":"#c62828";if(retestLine!==undefined&&val<=retestLine)col="#e65100";
      c.fillStyle=col;c.font="bold 11px sans-serif";c.fillText(val%1===0?val.toString():val.toFixed(1),pt.x,pt.y-8);
      if(ranks&&ranks[i]){c.textBaseline="top";c.fillStyle="#78909c";c.font="9px sans-serif";c.fillText(ranks[i].rank+"등",pt.x,pt.y+6)}});
    c.restore()}}]});
}

render();
</script>
